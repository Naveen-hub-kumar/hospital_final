{% extends 'doctors/base.html' %}

{% block content %}

<h1>My Patients</h1>

<div class="card">

    <table>

        <tr>

            <th>Patient Name</th>

            <th>Phone</th>

        </tr>

        {% for patient in patients %}

        <tr>

            <td>{{ patient.name }}</td>

            <td>{{ patient.phone }}</td>

        </tr>

        {% empty %}

        <tr>

            <td colspan="2">
                No Patients Found
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
