{% extends 'users/admin_dashboard.html' %}

{% block content %}

<style>

    .doctor-form-container{
        width:450px;
        margin:40px auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .doctor-form-container h1{
        text-align:center;
        margin-bottom:25px;
        color:#333;
    }

    .doctor-form-container input{
        width:100%;
        padding:12px;
        margin-bottom:15px;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:15px;
    }

    .doctor-form-container input:focus{
        border-color:#007bff;
        outline:none;
    }

    .doctor-form-container button{
        width:100%;
        padding:12px;
        background:#007bff;
        color:white;
        border:none;
        border-radius:5px;
        font-size:16px;
        cursor:pointer;
    }

    .doctor-form-container button:hover{
        background:#0056b3;
    }

</style>

<div class="doctor-form-container">

    <h1>Add Doctor</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="name"
               placeholder="Doctor Name"
               required>

        <input type="text"
               name="specialization"
               placeholder="Specialization"
               required>

        <input type="text"
               name="phone"
               placeholder="Phone"
               required>

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">

            Add Doctor

        </button>

    </form>

</div>

{% endblock %}
