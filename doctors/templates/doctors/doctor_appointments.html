{% extends 'doctors/base.html' %}

{% block content %}

<h1>My Appointments</h1>

<div class="card">

    <table>

        <tr>

            <th>Patient</th>

            <th>Date</th>

        </tr>

        {% for appointment in appointments %}

        <tr>

            <td>{{ appointment.patient.name }}</td>

            <td>{{ appointment.appointment_date}}</td>

        </tr>

        {% empty %}

        <tr>

            <td colspan="2">
                No Appointments Found
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
