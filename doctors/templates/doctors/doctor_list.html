<!DOCTYPE html>
<html>
<head>

    <title>Doctor List</title>

</head>

<body style="
        font-family:Arial, sans-serif;
        background:#f4f6f9;
        margin:0;
        padding:20px;
">

    <div style="
            width:90%;
            margin:auto;
    ">

        <!-- HEADING -->

        <h1 style="
                text-align:center;
                color:#333;
                margin-bottom:20px;
        ">

            Doctor List

        </h1>

        <!-- SEARCH BAR -->

        <form method="GET"
              style="
                    margin-bottom:20px;
                    text-align:center;
              ">

            <input type="text"
                   name="q"
                   placeholder="Search Doctor"
                   style="
                        padding:10px;
                        width:250px;
                        border:1px solid #ccc;
                        border-radius:5px;
                   ">

            <button type="submit"
                    style="
                        padding:10px 15px;
                        background:#007bff;
                        color:white;
                        border:none;
                        border-radius:5px;
                        cursor:pointer;
                    ">

                Search

            </button>

        </form>

        <!-- ADD DOCTOR BUTTON -->

        <div style="
                text-align:right;
                margin-bottom:20px;
        ">

            <a href="/doctors/add/"
               style="
                    background:#28a745;
                    color:white;
                    padding:10px 15px;
                    text-decoration:none;
                    border-radius:5px;
                    font-weight:bold;
               ">

                + Add Doctor

            </a>

        </div>

        <!-- TABLE -->

        <table style="
                width:100%;
                border-collapse:collapse;
                background:white;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
        ">

            <tr style="
                    background:#007bff;
                    color:white;
            ">

                <th style="
                        padding:12px;
                        border:1px solid #ddd;
                ">
                    ID
                </th>

                <th style="
                        padding:12px;
                        border:1px solid #ddd;
                ">
                    Name
                </th>

                <th style="
                        padding:12px;
                        border:1px solid #ddd;
                ">
                    Specialization
                </th>

                <th style="
                        padding:12px;
                        border:1px solid #ddd;
                ">
                    Phone
                </th>

                <th style="
                        padding:12px;
                        border:1px solid #ddd;
                ">
                    Action
                </th>

            </tr>

            {% for doctor in doctors %}

            <tr style="
                    text-align:center;
                    background:white;
            ">

                <td style="
                        padding:12px;
                        border:1px solid #ddd;
                ">

                    {{ doctor.id }}

                </td>

                <td style="
                        padding:12px;
                        border:1px solid #ddd;
                ">

                    {{ doctor.name }}

                </td>

                <td style="
                        padding:12px;
                        border:1px solid #ddd;
                ">

                    {{ doctor.specialization }}

                </td>

                <td style="
                        padding:12px;
                        border:1px solid #ddd;
                ">

                    {{ doctor.phone }}

                </td>

                <td style="
                        padding:12px;
                        border:1px solid #ddd;
                ">

                    <!-- VIEW -->

                    <a href="/doctors/view/{{ doctor.id }}/"
                       style="
                            background:green;
                            color:white;
                            padding:6px 10px;
                            text-decoration:none;
                            border-radius:4px;
                            margin-right:5px;
                       ">

                        View

                    </a>

                    <!-- UPDATE -->

                    <a href="/doctors/update/{{ doctor.id }}/"
                       style="
                            background:orange;
                            color:white;
                            padding:6px 10px;
                            text-decoration:none;
                            border-radius:4px;
                            margin-right:5px;
                       ">

                        Update

                    </a>

                    <!-- DELETE -->

               <a href="/doctors/delete/{{ doctor.id }}/"
   onclick="return confirm('Are you sure you want to delete this doctor?')"
   style="
        background:red;
        color:white;
        padding:6px 10px;
        text-decoration:none;
        border-radius:4px;
   ">

    Delete

</a>

                </td>

            </tr>

            {% empty %}

            <tr>

                <td colspan="5"
                    style="
                        text-align:center;
                        padding:20px;
                        color:gray;
                    ">

                    No Doctors Found

                </td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>
</html>
