{% comment %} <!DOCTYPE html>
<html>

<head>

    <title>Doctor Dashboard</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f6f9;
        }

        /* SIDEBAR */

        .sidebar{
            width:250px;
            height:100vh;
            background:#007bff;
            position:fixed;
            top:0;
            left:0;
            padding-top:20px;
        }

        .sidebar h2{
            color:white;
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 30px;
            font-size:18px;
        }

        .sidebar a:hover{
            background:white;
            color:#007bff;
        }

        /* MAIN */

        .main{
            margin-left:250px;
            padding:20px;
        }

        /* CARD */

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table th,
        table td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        table th{
            background:#007bff;
            color:white;
        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>🩺 Doctor Panel</h2>

        <a href="/doctor-dashboard/">
            Dashboard
        </a>

        <a href="/doctor-appointments/">
            My Appointments
        </a>

        <a href="/doctor-patients/">
            Patients
        </a>

        <a href="/logout/">
            Logout
        </a>

    </div>

    <!-- MAIN -->

    <div class="main">

        {% block content %}

        {% endblock %}

    </div>

</body>

</html> {% endcomment %}
