<!DOCTYPE html>
<html>
<head>

    <title>Appointment List</title>

</head>

<body style="
        font-family:Arial, sans-serif;
        background:#f4f6f9;
        margin:0;
        padding:20px;
">

    <div style="
            width:90%;
            margin:auto;
    ">

        <h1 style="
                text-align:center;
                color:#333;
                margin-bottom:20px;
        ">

            Appointment List

        </h1>

        <div style="
                text-align:right;
                margin-bottom:20px;
        ">

            <a href="/appointments/book/"
               style="
                    background:#007bff;
                    color:white;
                    padding:10px 15px;
                    text-decoration:none;
                    border-radius:5px;
                    font-weight:bold;
               ">

                + Book Appointment

            </a>

        </div>
        <form method="GET"
      style="text-align:center; margin-bottom:20px;">

    <input type="text"
           name="search"
           value="{{ request.GET.search }}"
           placeholder="Search appointment"
           style="
                padding:10px;
                width:250px;
                border:1px solid #ccc;
                border-radius:5px;
           ">

    <button type="submit"
            style="
                padding:10px 15px;
                background:#007bff;
                color:white;
                border:none;
                border-radius:5px;
                cursor:pointer;
            ">

        Search

    </button>

</form>

        <table style="
                width:100%;
                border-collapse:collapse;
                background:white;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
        ">

            <tr style="
                    background:#007bff;
                    color:white;
            ">

                <th style="
                        padding:12px;
                        border:1px solid #ddd;
                ">
                    ID
                </th>

                <th style="
                        padding:12px;
                        border:1px solid #ddd;
                ">
                    Doctor
                </th>

                <th style="
                        padding:12px;
                        border:1px solid #ddd;
                ">
                    Patient
                </th>

                <th style="
                        padding:12px;
                        border:1px solid #ddd;
                ">
                    Date
                </th>

                <th style="
                        padding:12px;
                        border:1px solid #ddd;
                ">
                    Action
                </th>

            </tr>

            {% for appointment in appointments %}

            <tr style="
                    text-align:center;
                    background:white;
            ">

                <td style="
                        padding:12px;
                        border:1px solid #ddd;
                ">

                    {{ appointment.id }}

                </td>

                <td style="
                        padding:12px;
                        border:1px solid #ddd;
                ">

                    {{ appointment.doctor.name }}

                </td>

                <td style="
                        padding:12px;
                        border:1px solid #ddd;
                ">

                    {{ appointment.patient.name }}

                </td>

                <td style="
                        padding:12px;
                        border:1px solid #ddd;
                ">

                    {{ appointment.appointment_date }}

                </td>

                <td style="
                        padding:12px;
                        border:1px solid #ddd;
                ">

                    <!-- VIEW BUTTON -->

                    <a href="/appointments/view/{{ appointment.id }}/"
                       style="
                            background:green;
                            color:white;
                            padding:6px 10px;
                            text-decoration:none;
                            border-radius:4px;
                            margin-right:5px;
                       ">

                        View

                    </a>

                    <!-- UPDATE BUTTON -->

                    <a href="/appointments/update/{{ appointment.id }}/"
                       style="
                            background:orange;
                            color:white;
                            padding:6px 10px;
                            text-decoration:none;
                            border-radius:4px;
                            margin-right:5px;
                       ">

                        Update

                    </a>

                    <!-- DELETE BUTTON -->

                    <a href="/appointments/delete/{{ appointment.id }}/"
                       onclick="return confirm('Are you sure you want to delete this appointment?')"
                       style="
                            background:red;
                            color:white;
                            padding:6px 10px;
                            text-decoration:none;
                            border-radius:4px;
                       ">

                        Delete

                    </a>

                </td>

            </tr>

            {% empty %}

            <tr>

                <td colspan="5"
                    style="
                        text-align:center;
                        padding:20px;
                        color:gray;
                    ">

                    No Appointments Found

                </td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>
</html>
