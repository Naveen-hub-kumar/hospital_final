{% extends 'users/admin_dashboard.html' %}

{% block content %}

<style>

.container{
    width:700px;
    margin:40px auto;
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:8px;
    color:#333;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    outline:none;
    transition:0.3s;
    box-sizing:border-box;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#0d6efd;
    box-shadow:0 0 8px rgba(13,110,253,0.3);
}

button{
    width:100%;
    padding:14px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    background:#0b5ed7;
}

</style>

<div class="container">

    <div class="card">

        <h2>➕ Add Patient</h2>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label>Password</label>
                {{ form.password }}
            </div>

            <div class="form-group">
                <label>Patient Name</label>
                {{ form.name }}
            </div>

            <div class="form-group">
                <label>Age</label>
                {{ form.age }}
            </div>

            <div class="form-group">
                <label>Gender</label>
                {{ form.gender }}
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                {{ form.phone }}
            </div>

            <div class="form-group">
                <label>Address</label>
                {{ form.address }}
            </div>

            <button type="submit">
                💾 Save Patient
            </button>

        </form>

    </div>

</div>

{% endblock content %}
