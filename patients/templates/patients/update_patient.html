<!DOCTYPE html>
<html>
<head>
    <title>Update Patient</title>
</head>
<body>

    <h1>Update Patient</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="name"
               value="{{ patient.name }}">

        <br><br>

        <input type="number"
               name="age"
               value="{{ patient.age }}">

        <br><br>

        <input type="text"
               name="gender"
               value="{{ patient.gender }}">

        <br><br>

        <input type="text"
               name="phone"
               value="{{ patient.phone }}">

        <br><br>

        <textarea name="address">{{ patient.address }}</textarea>

        <br><br>

        <button type="submit">
            Update
        </button>

    </form>

</body>
</html>
